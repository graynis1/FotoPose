name: Posra
options:
  bundleIdPrefix: com.fotopose
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  developmentLanguage: en

knownRegions:
  - en
  - tr
  - Base

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: "minimal"
    SWIFT_UPCOMING_FEATURE_INFER_SENDABLE_FROM_CAPTURES: "NO"
    SWIFT_UPCOMING_FEATURE_GLOBAL_CONCURRENCY: "NO"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  Posra:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
      - path: Models
      - path: ViewModels
      - path: Views
      - path: Services
      - path: Design
      - path: Extensions
      - path: Resources
    resources:
      - path: Resources/Assets.xcassets
      - path: Resources/en.lproj
      - path: Resources/tr.lproj
    info:
      path: SupportingFiles/Info.plist
      properties:
        CFBundleName: FotoPose
        CFBundleDisplayName: FotoPose
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - tr
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIUserInterfaceStyle: Dark
        NSCameraUsageDescription: "FotoPose uses your camera to analyze lighting and suggest poses in real-time. No photos are ever uploaded."
        NSLocationWhenInUseUsageDescription: "FotoPose uses your location to calculate golden hour timing for better photo suggestions."
        NSPhotoLibraryAddUsageDescription: "FotoPose saves the photos you capture to your photo library."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fotopose.app
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: SupportingFiles/Info.plist
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
